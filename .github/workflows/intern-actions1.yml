name: Execute test script and show branch and verify user input

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  show-branch:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Identify workflow
        run: echo "intern-actions1.yml"
                
      - name: Print runner details
        run: |
          echo "Runner Name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Architecture: $RUNNER_ARCH"
          echo "Runner Temp Dir: $RUNNER_TEMP"
          echo "Runner Workspace: $RUNNER_WORKSPACE"

      - name: Detect runner type
        run: |
          if [ "${{ runner.environment }}" = "github-hosted" ]; then
            echo "This is a GitHub-hosted runner"
          else
            echo "This is a self-hosted runner"
          fi

      - name: Make script executable
        run: chmod +x test-script.sh

      - name: Run test script
        env:
          USER_INPUT: "br@2jesh"
        run: ./test-script.sh "$USER_INPUT"

      - name: Print branch
        run: echo "Branch is ${{ github.ref_name }}"

      - name: Print PR source branch
        if: github.event_name == 'pull_request'
        run: echo "PR branch is ${{ github.head_ref }}"
