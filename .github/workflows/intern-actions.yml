name: Execute runner script and show branch and verify commit message

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  show-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Identify workflow
        run: echo "intern-actions.yml"

      - name: Print runner details
        run: |
          echo "Runner Name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Architecture: $RUNNER_ARCH"
          echo "Runner Temp Dir: $RUNNER_TEMP"
          echo "Runner Workspace: $RUNNER_WORKSPACE"

      - name: Detect runner type
        run: |
          if [ "${{ runner.environment }}" = "github-hosted" ]; then
            echo "This is a GitHub-hosted runner"
          else
            echo "This is a self-hosted runner"
          fi

      - name: Make script executable
        run: chmod +x runner.sh

      # ✅ For PUSH events
      - name: Run runner script (push commit message)
        if: github.event_name == 'push'
        env:
          USER_INPUT: ${{ github.event.head_commit.message }}
        run: |
          echo "Commit message: $USER_INPUT"
          ./runner.sh "$USER_INPUT"

      # ✅ For PR events
      - name: Run runner script (PR title)
        if: github.event_name == 'pull_request'
        env:
          USER_INPUT: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $USER_INPUT"
          ./runner.sh "$USER_INPUT"

      - name: Print branch
        run: echo "Branch is ${{ github.ref_name }}"

      - name: Print PR source branch
        if: github.event_name == 'pull_request'
        run: echo "PR branch is ${{ github.head_ref }}"
