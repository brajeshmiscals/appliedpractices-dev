name: Show Branch

on:
  push:
  pull_request:

jobs:
  show-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x test-runner.sh

      # ✅ For PUSH events
      - name: Run test script (push commit message)
        if: github.event_name == 'push'
        env:
          USER_INPUT: ${{ github.event.head_commit.message }}
        run: |
          echo "Commit message: $USER_INPUT"
          ./test-runner.sh "$USER_INPUT"

      # ✅ For PR events
      - name: Run test script (PR title)
        if: github.event_name == 'pull_request'
        env:
          USER_INPUT: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $USER_INPUT"
          ./test-runner.sh "$USER_INPUT"

      - name: Print branch
        run: echo "Branch is ${{ github.ref_name }}"

      - name: Print PR source branch
        if: github.event_name == 'pull_request'
        run: echo "PR branch is ${{ github.head_ref }}"